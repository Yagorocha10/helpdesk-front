<h2 mat-dialog-title>Nova Pasta</h2>

<mat-dialog-content [formGroup]="folderForm">
  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Nome da Pasta</mat-label>
    <input matInput formControlName="name" placeholder="Ex: Contratos, Relatórios" (keyup.enter)="onSubmit()">
    <mat-error *ngIf="folderForm.get('name')?.hasError('required')">
      O nome da pasta é obrigatório.
    </mat-error>
    <mat-error *ngIf="folderForm.get('name')?.hasError('minlength')">
      O nome deve ter no mínimo 3 caracteres.
    </mat-error>
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancelar</button>
  <button mat-raised-button color="primary" [disabled]="folderForm.invalid" (click)="onSubmit()">Salvar</button>
</mat-dialog-actions>
