<mat-card class="storage-card">
  <mat-card-content class="storage-content">
    <div class="storage-icon" aria-hidden="true">
      <mat-icon>storage</mat-icon>
    </div>

    <div class="storage-main">
      <span class="storage-label">Armazenamento</span>
      <span class="storage-summary">
       • {{ formattedTotalFiles }} {{ totalFilesLabel }} • {{ formattedTotalSize }}
      </span>
      <span *ngIf="errorMessage" class="storage-error">{{ errorMessage }}</span>
    </div>

    <div class="storage-progress" aria-label="Porcentagem visual de armazenamento utilizado">
      <div class="storage-progress-bar" [class.empty]="storagePercent === 0" [style.width.%]="storagePercent"></div>
    </div>

    <mat-progress-bar *ngIf="isLoading" mode="indeterminate"></mat-progress-bar>
  </mat-card-content>
</mat-card>
