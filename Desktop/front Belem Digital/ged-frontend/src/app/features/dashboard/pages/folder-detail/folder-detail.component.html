<div class="ged-container" [appFolderDrop]="folderId">
  
  <div class="detail-header">
    <div class="title-block">
      <button
        type="button"
        mat-icon-button
        [routerLink]="currentFolder?.parentId ? ['/dashboard/folder', currentFolder?.parentId] : ['/dashboard']"
        class="btn-back">
        <mat-icon>arrow_back</mat-icon>
      </button>
      <h2>{{ currentFolder ? formatFolderName(currentFolder.name) : 'Documentos' }}</h2>
    </div>
    
    <div class="actions-block">
      <button type="button" mat-stroked-button class="btn-subfolder" (click)="toggleSubFolderInput()">
        <mat-icon>create_new_folder</mat-icon>
        Nova Subpasta
      </button>
      <app-upload-dropzone
        class="detail-upload-dropzone"
        [folderId]="folderId"
        label="Solte arquivos nesta pasta"
        hint="Upload de Arquivo">
      </app-upload-dropzone>
    </div>
  </div>

  <div *ngIf="subFolderMessage" class="subfolder-unavailable-message">
    <mat-icon>info</mat-icon>
    <span>{{ subFolderMessage }}</span>
  </div>

  <div *ngIf="showSubFolderInput" class="custom-subfolder-input-box">
    <input
      type="text"
      [(ngModel)]="newSubFolderName"
      [disabled]="isCreatingSubFolder"
      (keyup.enter)="createSubFolder()"
      placeholder="Nome da subpasta...">
    <button
      type="button"
      mat-flat-button
      color="primary"
      [disabled]="isCreatingSubFolder || !newSubFolderName.trim()"
      (click)="createSubFolder()">
      Criar
    </button>
  </div>

  <div *ngIf="subFolders.length > 0" class="subfolders-section">
    <h4 class="section-indicator">Subpastas</h4>
    <div class="custom-folders-grid">
      <div
        class="custom-folder-card mini"
        *ngFor="let sub of subFolders; trackBy: trackByFolderId"
        [appFolderDrop]="sub.id"
        [routerLink]="['/dashboard/folder', sub.id]">
        <button
          type="button"
          mat-icon-button
          class="subfolder-delete-btn"
          title="Excluir subpasta"
          [disabled]="deletingSubFolderIds.has(sub.id)"
          (mousedown)="$event.stopPropagation()"
          (click)="deleteSubFolder($event, sub)">
          <mat-icon>delete</mat-icon>
        </button>
        <div class="card-row-top">
          <div class="folder-icon-wrapper">
            <mat-icon>folder</mat-icon>
          </div>
          <div class="folder-title-block">
            <h3 class="folder-title">{{ formatFolderName(sub.name) }}</h3>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="divider-space" *ngIf="subFolders.length > 0"></div>

  <h4 class="section-indicator">Arquivos</h4>
  <div class="custom-table-wrapper">
    <table mat-table [dataSource]="documents" class="clean-table">
      
      <ng-container matColumnDef="icon">
        <th mat-header-cell *matHeaderCellDef width="40"></th>
        <td mat-cell *matCellDef="let doc">
          <mat-icon class="file-icon">description</mat-icon>
        </td>
      </ng-container>

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef> Nome do arquivo </th>
        <td mat-cell *matCellDef="let doc" class="doc-name-cell" (click)="viewFile(doc)"> {{ doc.name }} </td>
      </ng-container>

      <ng-container matColumnDef="type">
        <th mat-header-cell *matHeaderCellDef width="100"> Tipo </th>
        <td mat-cell *matCellDef="let doc"> <span class="badge-type">{{ doc.type }}</span> </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef width="100" class="text-right"></th>
        <td mat-cell *matCellDef="let doc" class="text-right">
          <div class="actions-cell">
            <button type="button" mat-icon-button class="action-btn view" (click)="$event.stopPropagation(); viewFile(doc)" title="Visualizar">
              <mat-icon>visibility</mat-icon>
            </button>
            <button type="button" mat-icon-button class="action-btn download" (click)="$event.stopPropagation(); downloadFile(doc)" title="Baixar">
              <mat-icon>download</mat-icon>
            </button>
            <button
              type="button"
              mat-icon-button
              class="action-btn delete"
              [disabled]="deletingDocumentIds.has(doc.id)"
              (mousedown)="$event.stopPropagation()"
              (click)="deleteFile($event, doc)"
              title="Excluir">
              <mat-icon>delete</mat-icon>
            </button>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row class="file-row" *matRowDef="let row; columns: displayedColumns;" [appFolderDrop]="folderId"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell empty-table-message" colspan="4">
          Nenhum documento armazenado nesta pasta.
        </td>
      </tr>
    </table>
  </div>

</div>
